name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy frontend to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/alfa-hospital
            git -C alfa-frontend pull
            git -C alfa-docker pull
            docker container prune -f
            docker compose -f alfa-docker/docker-compose.prod.yml up -d --build --force-recreate frontend
