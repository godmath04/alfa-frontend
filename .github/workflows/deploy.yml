name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Deploy frontend to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/alfa-hospital
            git -C alfa-frontend pull
            git -C alfa-docker pull
            docker compose -f alfa-docker/docker-compose.prod.yml rm -sf frontend || true
            docker container prune -f || true
            docker compose -f alfa-docker/docker-compose.prod.yml up -d --build --no-deps frontend
