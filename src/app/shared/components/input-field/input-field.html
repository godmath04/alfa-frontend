<div class="input-wrapper">
  @if (label) {
    <label class="input-label">{{ label }}</label>
  }
  <div class="input-container" [class.input-container--error]="errorMessage">
    <input
      [type]="type"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [value]="value"
      class="input-field"
      (input)="_onInput($event)"
      (blur)="_onBlur()"
    />
  </div>
  @if (errorMessage) {
    <span class="input-error">{{ errorMessage }}</span>
  }
</div>
